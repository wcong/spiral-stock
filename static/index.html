<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缠论分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 16px; font-weight: 700; color: #58a6ff; }
  .header span { color: #8b949e; font-size: 12px; }
  .header .tab-bar { margin-left: auto; padding: 0; border: none; }
  .header .tab-btn { flex: 0; min-width: 92px; }

  .layout { display: flex; height: calc(100vh - 57px); }

  /* 左侧控制面板 */
  .sidebar {
    width: 300px; min-width: 260px;
    background: #161b22;
    border-right: 1px solid #30363d;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .tab-bar {
    display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #21262d;
  }
  .tab-btn {
    flex: 1; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 1px solid #30363d; background: #0d1117; color: #8b949e;
    transition: all 0.2s;
  }
  .tab-btn.active { background: #21262d; color: #e6edf3; border-color: #58a6ff; }
  .tab-panel { display: none; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #30363d;
    background: #0d1117; color: #e6edf3; font-size: 12px;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid #21262d; }
  .sidebar-section h3 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  
  .btn {
    width: 100%; padding: 8px 14px; border: none; border-radius: 6px;
    font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
  }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
  .btn-secondary:hover { background: #30363d; }
  .btn-danger { background: #da3633; color: #fff; }

  .upload-area {
    border: 2px dashed #30363d; border-radius: 8px;
    padding: 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 8px;
  }
  .upload-area:hover { border-color: #58a6ff; background: #1c2128; }
  .upload-area input { display: none; }
  .upload-area .icon { font-size: 24px; margin-bottom: 8px; }
  .upload-area p { font-size: 12px; color: #8b949e; }

  .json-input textarea {
    width: 100%; height: 120px; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; padding: 8px; font-size: 12px;
    resize: vertical; font-family: monospace;
  }

  /* 图层控制 */
  .layer-toggles { display: flex; flex-direction: column; gap: 8px; }
  .toggle-item {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 6px 8px; border-radius: 6px; transition: background 0.2s;
  }
  .toggle-item:hover { background: #21262d; }
  .toggle-item input[type=checkbox] { width: 16px; height: 16px; accent-color: #58a6ff; cursor: pointer; }
  .toggle-item .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .toggle-item label { font-size: 13px; cursor: pointer; }
  .badge { font-size: 11px; background: #21262d; padding: 1px 6px; border-radius: 10px; color: #8b949e; margin-left: auto; }

  /* 统计信息 */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 10px; text-align: center; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #58a6ff; }
  .stat-card .label { font-size: 11px; color: #8b949e; margin-top: 2px; }

  /* 买卖点列表 */
  .signals-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .signal-card {
    background: #0d1117; border: 1px solid #21262d; border-radius: 8px;
    padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
  }
  .signal-card:hover { border-color: #58a6ff; transform: translateX(2px); }
  .signal-card.buy { border-left: 3px solid #3fb950; }
  .signal-card.sell { border-left: 3px solid #f85149; }
  .signal-card .signal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .signal-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  .buy-badge { background: #1a3a1a; color: #3fb950; border: 1px solid #3fb950; }
  .sell-badge { background: #3a1a1a; color: #f85149; border: 1px solid #f85149; }
  .signal-dt { font-size: 12px; color: #8b949e; }
  .signal-price { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .signal-reason { font-size: 11px; color: #8b949e; white-space: pre-line; line-height: 1.6; }
  .signal-reason.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  /* 主图区 */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chart-toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-bottom: 1px solid #21262d;
    background: #0d1117; position: sticky; top: 0; z-index: 5;
  }
  .chart-toolbar .toggle-item { padding: 4px 6px; }
  .trend-badge {
    margin-left: auto; padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; border: 1px solid #30363d;
    background: rgba(22,27,34,0.9);
  }
  #chart { flex: 1; }

  /* 状态提示 */
  .status-bar {
    background: #161b22; border-top: 1px solid #30363d;
    padding: 6px 16px; font-size: 12px; color: #8b949e;
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }

  /* Loading */
  .loading-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(13,17,23,0.8); z-index: 100;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #21262d;
    border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tooltip弹窗 */
  .tooltip-panel {
    display: none; position: fixed; max-width: 400px;
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 16px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    font-size: 12px; line-height: 1.7; white-space: pre-line;
  }
  .tooltip-panel h4 { color: #58a6ff; margin-bottom: 8px; font-size: 14px; }
  .tooltip-close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #8b949e; font-size: 18px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>📈 缠论分析系统</h1>
  <span>Chan Theory · 笔 · 线段 · 中枢 · 三类买卖点</span>
  <div class="tab-bar">
    <button class="tab-btn active" id="tabData" onclick="switchTab('data')">数据分析</button>
    <button class="tab-btn" id="tabCrawler" onclick="switchTab('crawler')">数据抓取</button>
  </div>
</div>

<div class="layout">
  <!-- 左侧面板 -->
  <div class="sidebar">

    <div class="tab-panel active" id="panelData">

    <div class="sidebar-section">
      <h3>数据输入</h3>
      <div style="margin-top:6px;font-size:12px;color:#8b949e">本地数据</div>
      <div id="stockFileList" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow:auto"></div>
    </div>

    <div class="sidebar-section">
      <h3>时间范围</h3>
      <div class="input-row" style="margin-bottom:8px;">
        <input type="date" id="rangeStart">
        <input type="date" id="rangeEnd">
      </div>
      <button class="btn btn-primary" onclick="applyDateRangeAndAnalyze()">✅ 确认并分析</button>
      <div style="margin-top:8px;font-size:11px;color:#8b949e" id="rangeHint">默认最近6个月</div>
    </div>


    <div class="sidebar-section">
      <h3>统计概览</h3>
      <div class="stats-grid">
        <div class="stat-card"><div class="value" id="stat-candles">-</div><div class="label">K线数</div></div>
        <div class="stat-card"><div class="value" id="stat-bi">-</div><div class="label">笔数</div></div>
        <div class="stat-card"><div class="value" id="stat-zs">-</div><div class="label">中枢数</div></div>
        <div class="stat-card"><div class="value" id="stat-buy" style="color:#3fb950">-</div><div class="label">买点数</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>趋势过滤</h3>
      <div style="font-size:12px;color:#8b949e;line-height:1.6" id="trendSummary">-</div>
      <div style="margin-top:8px;font-size:12px;color:#8b949e;line-height:1.6" id="trendDetail">-</div>
      <div class="toggle-item" style="margin-top:10px">
        <input type="checkbox" id="useFiltered" checked onchange="redraw();renderSignalList();">
        <span class="color-dot" style="background:#58a6ff"></span>
        <label for="useFiltered">只显示过滤信号</label>
        <span class="badge" id="badge-filtered">0</span>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#8b949e" id="filterHint">-</div>
    </div>

    <div class="sidebar-section">
      <h3>结构诊断</h3>
      <div style="font-size:12px;color:#8b949e;line-height:1.6" id="diagSummary">-</div>
      <div style="margin-top:6px;font-size:11px;color:#8b949e;line-height:1.6" id="diagDetail">-</div>
    </div>

    <div class="sidebar-section">
      <h3>趋势预测</h3>
      <div style="font-size:12px;color:#8b949e;line-height:1.6" id="forecastList">-</div>
      <div style="margin-top:6px;font-size:11px;color:#8b949e;line-height:1.6">仅为概率评估，非确定预测</div>
    </div>

    <div class="signals-list" id="signalsList">
      <div style="color:#8b949e;font-size:13px;text-align:center;padding:20px;">
        请先加载股票数据
      </div>
    </div>

    </div>

    <div class="tab-panel" id="panelCrawler">

      <div class="sidebar-section">
        <h3>抓取近一年</h3>
        <div style="font-size:12px;color:#8b949e;line-height:1.6;margin-bottom:8px;">
          数据源：东方财富日线（默认前复权）
        </div>
        <div class="input-row" style="margin-bottom:8px;">
          <input type="text" id="crawlCode" placeholder="股票代码，如 002594 或 sz002594">
          <button class="btn btn-primary" style="width:auto" onclick="crawlData()">抓取</button>
        </div>
        <div class="input-row" style="margin-bottom:8px;">
          <select id="crawlFqt" style="flex:1;padding:8px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:12px;">
            <option value="0" selected>不复权 (fqt=0)</option>
            <option value="1">前复权 (fqt=1)</option>
            <option value="2">后复权 (fqt=2)</option>
          </select>
        </div>
        <div style="font-size:11px;color:#8b949e;line-height:1.6" id="crawlHint">-</div>
      </div>

      <div class="sidebar-section">
        <h3>抓取结果</h3>
        <div style="font-size:12px;color:#8b949e;line-height:1.6" id="crawlResult">-</div>
        <button class="btn btn-secondary" id="crawlUse" style="margin-top:10px;display:none" onclick="useCrawlData()">直接分析这份数据</button>
      </div>

    </div>

  </div>

  <!-- 主图 -->
  <div class="main-area" style="position:relative">
    <div class="chart-toolbar">
      <div class="toggle-item">
        <input type="checkbox" id="showBi" checked onchange="redraw()">
        <span class="color-dot" style="background:#f7931a"></span>
        <label for="showBi">笔</label>
        <span class="badge" id="badge-bi">0</span>
      </div>
      <div class="toggle-item">
        <input type="checkbox" id="showSegment" checked onchange="redraw()">
        <span class="color-dot" style="background:#a78bfa"></span>
        <label for="showSegment">线段</label>
        <span class="badge" id="badge-seg">0</span>
      </div>
      <div class="toggle-item">
        <input type="checkbox" id="showZhongshu" checked onchange="redraw()">
        <span class="color-dot" style="background:#38bdf8;opacity:0.5"></span>
        <label for="showZhongshu">中枢</label>
        <span class="badge" id="badge-zs">0</span>
      </div>
      <div class="toggle-item">
        <input type="checkbox" id="showBuy" checked onchange="redraw()">
        <span class="color-dot" style="background:#3fb950"></span>
        <label for="showBuy">买点</label>
        <span class="badge" id="badge-buy">0</span>
      </div>
      <div class="toggle-item">
        <input type="checkbox" id="showSell" checked onchange="redraw()">
        <span class="color-dot" style="background:#f85149"></span>
        <label for="showSell">卖点</label>
        <span class="badge" id="badge-sell">0</span>
      </div>
      <div class="trend-badge" id="trendBadge">趋势: -</div>
    </div>
    <div id="chart"></div>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div>分析中...</div>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="statusDot" style="background:#8b949e"></span>
      <span id="statusText">等待数据...</span>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="tooltip-panel" id="tooltipPanel">
  <span class="tooltip-close" onclick="closeTooltip()">×</span>
  <h4 id="tooltipTitle"></h4>
  <div id="tooltipContent"></div>
</div>

<script>
let chart = null;
let analysisData = null;
let lastCrawlData = null;
let lastLoadedData = null;

// 初始化ECharts
function initChart() {
  chart = echarts.init(document.getElementById('chart'), 'dark');
  window.addEventListener('resize', () => chart.resize());
  chart.on('click', onChartClick);
}

// 加载示例数据
async function loadLocalFileList() {
  const container = document.getElementById('stockFileList');
  container.innerHTML = '<div style="color:#8b949e;font-size:12px">加载中...</div>';
  try {
    const resp = await fetch('/api/stock_files');
    const json = await resp.json();
    const files = json.files || [];
    if (files.length === 0) {
      container.innerHTML = '<div style="color:#8b949e;font-size:12px">暂无本地文件</div>';
      return;
    }
    container.innerHTML = files.map(f => (
      `<button class="btn btn-secondary" style="text-align:left" onclick="loadLocalFile('${f.file}')">${f.code}</button>`
    )).join('');
  } catch (e) {
    container.innerHTML = `<div style="color:#f85149;font-size:12px">加载失败: ${e.message}</div>`;
  }
}

async function loadLocalFile(file) {
  showLoading(true);
  try {
    const resp = await fetch(`/api/stock_data?file=${encodeURIComponent(file)}`);
    const json = await resp.json();
    if (!json.success) throw new Error(json.error);
    lastLoadedData = json.data || [];
    setDateRangeDefaults(lastLoadedData);
    await applyDateRangeAndAnalyze();
  } catch (e) {
    setStatus('error', '加载失败: ' + e.message);
  } finally {
    showLoading(false);
  }
}

// 上传文件

async function runAnalysis(data) {
  const resp = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data }),
  });
  const json = await resp.json();
  if (!json.success) throw new Error(json.error);
  handleResult(json);
}

function handleResult(json) {
  analysisData = json.data;
  const s = json.summary;
  const bias = analysisData.trade_bias || { direction: 'side', source_level: 'base' };
  const trendMeta = analysisData.trend_meta || {};
  const diag = analysisData.diagnostics || {};
  const filteredBuy = analysisData.filtered_buy_points || [];
  const filteredSell = analysisData.filtered_sell_points || [];
  const forecast = analysisData.forecast || [];
  
  // 更新统计
  document.getElementById('stat-candles').textContent = s.total_candles;
  document.getElementById('stat-bi').textContent = s.bis_count;
  document.getElementById('stat-zs').textContent = s.zhongshus_count;
  document.getElementById('stat-buy').textContent = s.buy_points_count;
  document.getElementById('badge-bi').textContent = s.bis_count;
  document.getElementById('badge-seg').textContent = s.segments_count;
  document.getElementById('badge-zs').textContent = s.zhongshus_count;
  document.getElementById('badge-buy').textContent = s.buy_points_count;
  document.getElementById('badge-sell').textContent = s.sell_points_count;
  document.getElementById('badge-filtered').textContent = filteredBuy.length + filteredSell.length;

  const dirText = bias.direction === 'up' ? '上行' : bias.direction === 'down' ? '下行' : '震荡';
  document.getElementById('trendSummary').textContent = `上级别趋势：${dirText}（来源 ${bias.source_level}）`;
  const zsText = trendMeta.zhongshu_zg && trendMeta.zhongshu_zd
    ? `中枢区间 [${trendMeta.zhongshu_zd.toFixed(2)}, ${trendMeta.zhongshu_zg.toFixed(2)}]`
    : '中枢区间：-';
  const lastPriceText = trendMeta.last_price != null ? `最新价 ${trendMeta.last_price.toFixed(2)}` : '最新价：-';
  const ruleText = trendMeta.rule ? `规则 ${trendMeta.rule}` : '规则：-';
  document.getElementById('trendDetail').textContent = `${zsText}，${lastPriceText}，${ruleText}`;
  document.getElementById('filterHint').textContent = `过滤后信号：买${filteredBuy.length} / 卖${filteredSell.length}`;
  const diagLine = `笔${diag.bis || 0} / 线段${diag.segments || 0} / 中枢${diag.zhongshus || 0}`;
  const beichiLine = `背驰：趋势${diag.beichi_trend || 0} / 盘整${diag.beichi_pan || 0} / 简易${diag.beichi_simple || 0}`;
  const signalLine = `信号：买${diag.buy_points || 0} / 卖${diag.sell_points || 0} · 过滤后 买${diag.filtered_buy_points || 0} / 卖${diag.filtered_sell_points || 0}`;
  document.getElementById('diagSummary').textContent = diagLine;
  document.getElementById('diagDetail').textContent = `${beichiLine}，${signalLine}`;

  if (forecast.length === 0) {
    document.getElementById('forecastList').textContent = '暂无预测';
  } else {
    const fmtDir = d => d === 'up' ? '看多' : d === 'down' ? '看空' : '震荡';
    const rows = forecast.map(f => (
      `未来${f.horizon_days}天：${fmtDir(f.direction)}，置信度${Math.round(f.confidence * 100)}%，${f.reason}`
    ));
    document.getElementById('forecastList').textContent = rows.join('\n');
  }
  const badge = document.getElementById('trendBadge');
  const badgeColor = bias.direction === 'up' ? '#3fb950' : bias.direction === 'down' ? '#f85149' : '#8b949e';
  badge.textContent = `趋势: ${dirText}`;
  badge.style.borderColor = badgeColor;
  badge.style.color = badgeColor;

  setStatus('ok', `分析完成：${s.total_candles}根K线，${s.bis_count}笔，${s.zhongshus_count}个中枢，${s.buy_points_count}个买点`);
  
  renderSignalList();
  redraw();
}

function redraw() {
  if (!analysisData) return;
  const option = buildChartOption(analysisData);
  chart.setOption(option, true);
}

function buildChartOption(d) {
  const dates = d.raw_candles.map(c => c.dt);
  const candleData = d.raw_candles.map(c => [c.open, c.close, c.low, c.high]);
  const volumes = d.raw_candles.map(c => c.volume || 0);
  const useFiltered = document.getElementById('useFiltered').checked;
  const buyList = useFiltered ? (d.filtered_buy_points || []) : d.buy_points;
  const sellList = useFiltered ? (d.filtered_sell_points || []) : d.sell_points;
  const trendDir = d.trade_bias?.direction || d.trend || 'side';
  const trendText = trendDir === 'up' ? '趋势: 上行 ▲' : trendDir === 'down' ? '趋势: 下行 ▼' : '趋势: 震荡 •';
  const trendColor = trendDir === 'up' ? '#3fb950' : trendDir === 'down' ? '#f85149' : '#8b949e';
  const trendBand = trendDir === 'up'
    ? 'rgba(63,185,80,0.08)'
    : trendDir === 'down'
      ? 'rgba(248,81,73,0.08)'
      : 'rgba(139,148,158,0.06)';

  // 颜色
  const upColor = '#26a69a', downColor = '#ef5350';

  // ===== 系列 =====
  const series = [];

  // 趋势背景带
  if (dates.length > 1) {
    series.push({
      name: '趋势带',
      type: 'line',
      xAxisIndex: 0,
      yAxisIndex: 0,
      data: [],
      silent: true,
      z: 1,
      markArea: {
        itemStyle: { color: trendBand },
        data: [[
          { xAxis: dates[0], yAxis: 'min' },
          { xAxis: dates[dates.length - 1], yAxis: 'max' }
        ]]
      }
    });
  }

  // 1. K线
  series.push({
    name: 'K线', type: 'candlestick',
    xAxisIndex: 0, yAxisIndex: 0,
    data: candleData,
    itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor },
    z: 10,
  });

  // 2. 成交量
  series.push({
    name: '成交量', type: 'bar',
    xAxisIndex: 1, yAxisIndex: 1,
    data: d.raw_candles.map((c, i) => ({
      value: c.volume || 0,
      itemStyle: { color: c.close >= c.open ? upColor : downColor, opacity: 0.6 }
    })),
    z: 5,
  });

  // 3. 笔
  if (document.getElementById('showBi').checked) {
    const biData = d.bis.flatMap(b => [
      { coord: [b.start_dt, b.start_price] },
      { coord: [b.end_dt, b.end_price] },
    ]);
    // 用 markLine 连接
    series.push({
      name: '笔', type: 'line',
      xAxisIndex: 0, yAxisIndex: 0,
      data: [], z: 20,
      markLine: {
        symbol: 'none',
        silent: true,
        lineStyle: { color: '#f7931a', width: 1.5, type: 'solid' },
        data: d.bis.map(b => ([
          { coord: [b.start_dt, b.start_price], name: `笔${b.index}` },
          { coord: [b.end_dt, b.end_price] },
        ])),
      }
    });
  }

  // 4. 线段
  if (document.getElementById('showSegment').checked && d.segments.length > 0) {
    series.push({
      name: '线段', type: 'line',
      xAxisIndex: 0, yAxisIndex: 0,
      data: [], z: 18,
      markLine: {
        symbol: 'none', silent: true,
        lineStyle: { color: '#a78bfa', width: 3, type: 'solid' },
        data: d.segments.map(s => ([
          { coord: [s.start_dt, s.start_price] },
          { coord: [s.end_dt, s.end_price] },
        ])),
      }
    });
  }

  // 5. 中枢（矩形区域）
  const markAreas = [];
  if (document.getElementById('showZhongshu').checked) {
    d.zhongshus.forEach(z => {
      markAreas.push([
        { xAxis: z.start_dt, yAxis: z.zd, name: `中枢${z.index}` },
        { xAxis: z.end_dt, yAxis: z.zg },
      ]);
    });
    if (markAreas.length > 0) {
      series.push({
        name: '中枢', type: 'line',
        xAxisIndex: 0, yAxisIndex: 0,
        data: [], z: 5,
        markArea: {
          silent: false,
          itemStyle: { color: 'rgba(56,189,248,0.08)', borderColor: 'rgba(56,189,248,0.4)', borderWidth: 1 },
          data: markAreas,
          label: {
            show: true, position: 'insideTopLeft',
            fontSize: 10, color: '#38bdf8', formatter: (p) => `ZS${p.data.name?.replace('中枢','') || ''}`
          },
        }
      });
    }
  }

  // 6. 买点标记
  const buyMarkPoints = [];
  if (document.getElementById('showBuy').checked) {
    buyList.forEach(bp => {
      buyMarkPoints.push({
        name: `B${bp.btype}`,
        coord: [bp.dt, bp.price],
        value: bp.price,
        symbol: 'triangle',
        symbolSize: 14,
        symbolOffset: [0, '50%'],
        itemStyle: { color: '#3fb950' },
        label: {
          show: true, position: 'bottom',
          formatter: `B${bp.btype}`,
          color: '#3fb950', fontSize: 10, fontWeight: 'bold',
        },
      });
    });
  }

  // 7. 卖点标记
  const sellMarkPoints = [];
  if (document.getElementById('showSell').checked) {
    sellList.forEach(sp => {
      sellMarkPoints.push({
        name: `S${sp.btype}`,
        coord: [sp.dt, sp.price],
        value: sp.price,
        symbol: 'triangle',
        symbolSize: 14,
        symbolRotate: 180,
        symbolOffset: [0, '-50%'],
        itemStyle: { color: '#f85149' },
        label: {
          show: true, position: 'top',
          formatter: `S${sp.btype}`,
          color: '#f85149', fontSize: 10, fontWeight: 'bold',
        },
      });
    });
  }

  if (buyMarkPoints.length > 0 || sellMarkPoints.length > 0) {
    series.push({
      name: '信号', type: 'scatter',
      xAxisIndex: 0, yAxisIndex: 0,
      data: [],
      markPoint: {
        data: [...buyMarkPoints, ...sellMarkPoints],
        tooltip: { show: false },
      },
    });
  }

  return {
    backgroundColor: '#0d1117',
    animation: false,
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross' },
      backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 12 },
      formatter: tooltipFormatter,
    },
    legend: {
      data: ['K线', '笔', '线段', '中枢', '买点', '卖点'],
      textStyle: { color: '#8b949e' },
      top: 4, right: 16,
    },
    axisPointer: { link: [{ xAxisIndex: 'all' }] },
    dataZoom: [
      { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
      { type: 'slider', xAxisIndex: [0, 1], height: 24, bottom: 30,
        handleStyle: { color: '#58a6ff' }, borderColor: '#21262d', fillerColor: 'rgba(88,166,255,0.1)',
        textStyle: { color: '#8b949e' } },
    ],
    grid: [
      { left: 60, right: 16, top: 50, bottom: 100, },
      { left: 60, right: 16, height: 60, bottom: 60, },
    ],
    xAxis: [
      { type: 'category', data: dates, gridIndex: 0, scale: true, boundaryGap: false,
        axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 11 },
        splitLine: { show: false }, min: 'dataMin', max: 'dataMax' },
      { type: 'category', data: dates, gridIndex: 1, scale: true, boundaryGap: false,
        axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { show: false },
        splitLine: { show: false } },
    ],
    yAxis: [
      { scale: true, gridIndex: 0,
        axisLine: { lineStyle: { color: '#30363d' } },
        axisLabel: { color: '#8b949e', fontSize: 11, formatter: v => v.toFixed(2) },
        splitLine: { lineStyle: { color: '#21262d' } } },
      { scale: true, gridIndex: 1,
        axisLine: { lineStyle: { color: '#30363d' } },
        axisLabel: { color: '#8b949e', fontSize: 10, formatter: v => (v/1000).toFixed(0)+'K' },
        splitLine: { show: false } },
    ],
    series,
  };
}

function tooltipFormatter(params) {
  const kParam = params.find(p => p.seriesName === 'K线');
  if (!kParam) return '';
  const dt = kParam.axisValue;
  const useFiltered = document.getElementById('useFiltered').checked;
  const buyList = useFiltered ? (analysisData.filtered_buy_points || []) : analysisData.buy_points;
  const sellList = useFiltered ? (analysisData.filtered_sell_points || []) : analysisData.sell_points;

  const raw = analysisData?.raw_candles?.find(c => c.dt === dt);
  const open = raw ? raw.open : kParam.data[0];
  const close = raw ? raw.close : kParam.data[1];
  const low = raw ? raw.low : kParam.data[2];
  const high = raw ? raw.high : kParam.data[3];
  const chg = ((close - open) / open * 100).toFixed(2);
  const color = close >= open ? '#26a69a' : '#ef5350';

  // 检查是否有买卖点
  let signalHtml = '';
  if (analysisData) {
    const bp = buyList.find(p => p.dt === dt);
    const sp = sellList.find(p => p.dt === dt);
    if (bp) signalHtml += `<div style="color:#3fb950;margin-top:6px">▲ 第${bp.btype}类买点</div>`;
    if (sp) signalHtml += `<div style="color:#f85149;margin-top:4px">▼ 第${sp.btype}类卖点</div>`;
  }

  return `
    <div style="font-size:12px;line-height:1.8">
      <b>${dt}</b><br>
      开: <span style="color:${color}">${open}</span>&nbsp;
      收: <span style="color:${color}">${close}</span><br>
      高: ${high}&nbsp; 低: ${low}<br>
      涨幅: <span style="color:${color}">${chg}%</span>
      ${signalHtml}
    </div>
  `;
}

function onChartClick(params) {
  if (!analysisData) return;
  const dt = params.data?.coord?.[0] || params.value?.[0] || null;
  if (!dt) return;
  const useFiltered = document.getElementById('useFiltered').checked;
  const buyList = useFiltered ? (analysisData.filtered_buy_points || []) : analysisData.buy_points;
  const sellList = useFiltered ? (analysisData.filtered_sell_points || []) : analysisData.sell_points;

  const bp = buyList.find(p => p.dt === dt);
  const sp = sellList.find(p => p.dt === dt);
  if (bp) {
    const src = bp.source ? `\n\n来源规则：${bp.source}` : '';
    showTooltipPanel(`第${bp.btype}类买点 · ${bp.dt}`, `${bp.reason}${src}`, params.event?.event);
  } else if (sp) {
    const src = sp.source ? `\n\n来源规则：${sp.source}` : '';
    showTooltipPanel(`第${sp.btype}类卖点 · ${sp.dt}`, `${sp.reason}${src}`, params.event?.event);
  }
}

function showTooltipPanel(title, content, evt) {
  const panel = document.getElementById('tooltipPanel');
  document.getElementById('tooltipTitle').textContent = title;
  document.getElementById('tooltipContent').textContent = content;
  panel.style.display = 'block';
  if (evt) {
    let x = evt.clientX + 12, y = evt.clientY - 10;
    if (x + 420 > window.innerWidth) x = window.innerWidth - 430;
    if (y + 300 > window.innerHeight) y = window.innerHeight - 310;
    panel.style.left = x + 'px';
    panel.style.top = y + 'px';
  } else {
    panel.style.left = '50%';
    panel.style.top = '50%';
    panel.style.transform = 'translate(-50%,-50%)';
  }
}

function closeTooltip() {
  document.getElementById('tooltipPanel').style.display = 'none';
}

function renderSignalList() {
  if (!analysisData) return;
  const container = document.getElementById('signalsList');
  const useFiltered = document.getElementById('useFiltered').checked;
  const buyList = useFiltered ? (analysisData.filtered_buy_points || []) : analysisData.buy_points;
  const sellList = useFiltered ? (analysisData.filtered_sell_points || []) : analysisData.sell_points;
  const allSignals = [
    ...buyList.map(p => ({ ...p, side: 'buy' })),
    ...sellList.map(p => ({ ...p, side: 'sell' })),
  ].sort((a, b) => a.dt.localeCompare(b.dt));

  if (allSignals.length === 0) {
    container.innerHTML = '<div style="color:#8b949e;font-size:13px;text-align:center;padding:20px;">未发现买卖信号</div>';
    return;
  }

  container.innerHTML = allSignals.map(s => `
    <div class="signal-card ${s.side}" onclick="onSignalClick('${s.dt}', '${s.side}')">
      <div class="signal-header">
        <span class="signal-badge ${s.side}-badge">${s.side === 'buy' ? '买' : '卖'}${s.btype}</span>
        <span class="signal-dt">${s.dt}</span>
      </div>
      <div class="signal-price" style="color:${s.side === 'buy' ? '#3fb950' : '#f85149'}">
        ¥${s.price.toFixed(2)}
      </div>
      <div class="signal-reason collapsed" id="reason-${s.dt}-${s.side}">${s.reason}</div>
      <div style="font-size:11px;color:#58a6ff;margin-top:4px" onclick="toggleReason(event,'${s.dt}','${s.side}')">展开详情 ▼</div>
    </div>
  `).join('');
}

function toggleReason(evt, dt, side) {
  evt.stopPropagation();
  const el = document.getElementById(`reason-${dt}-${side}`);
  const btn = evt.target;
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    btn.textContent = '收起 ▲';
  } else {
    el.classList.add('collapsed');
    btn.textContent = '展开详情 ▼';
  }
}

function onSignalClick(dt, side) {
  if (!analysisData || !chart) return;
  // 跳转到对应K线位置
  const idx = analysisData.raw_candles.findIndex(c => c.dt === dt);
  if (idx < 0) return;
  const total = analysisData.raw_candles.length;
  const pct = idx / total * 100;
  const half = 15;
  chart.dispatchAction({
    type: 'dataZoom',
    start: Math.max(0, pct - half),
    end: Math.min(100, pct + half),
  });

  // 显示详情
  const useFiltered = document.getElementById('useFiltered').checked;
  const buyList = useFiltered ? (analysisData.filtered_buy_points || []) : analysisData.buy_points;
  const sellList = useFiltered ? (analysisData.filtered_sell_points || []) : analysisData.sell_points;
  const signal = side === 'buy'
    ? buyList.find(p => p.dt === dt)
    : sellList.find(p => p.dt === dt);
  if (signal) {
    const src = signal.source ? `\n\n来源规则：${signal.source}` : '';
    showTooltipPanel(`第${signal.btype}类${side === 'buy' ? '买' : '卖'}点 · ${signal.dt}`, `${signal.reason}${src}`);
    document.getElementById('tooltipPanel').style.left = '50%';
    document.getElementById('tooltipPanel').style.top = '30%';
    document.getElementById('tooltipPanel').style.transform = 'translate(-50%,0)';
  }
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('active', show);
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  dot.style.background = type === 'ok' ? '#3fb950' : type === 'error' ? '#f85149' : '#8b949e';
  document.getElementById('statusText').textContent = text;
}

function switchTab(tab) {
  document.getElementById('tabData').classList.toggle('active', tab === 'data');
  document.getElementById('tabCrawler').classList.toggle('active', tab === 'crawler');
  document.getElementById('panelData').classList.toggle('active', tab === 'data');
  document.getElementById('panelCrawler').classList.toggle('active', tab === 'crawler');
}

async function crawlData() {
  const code = document.getElementById('crawlCode').value.trim();
  const fqt = document.getElementById('crawlFqt').value;
  if (!code) {
    document.getElementById('crawlHint').textContent = '请输入股票代码';
    return;
  }
  showLoading(true);
  document.getElementById('crawlHint').textContent = '抓取中...';
  document.getElementById('crawlResult').textContent = '-';
  document.getElementById('crawlUse').style.display = 'none';
  try {
    const resp = await fetch('/api/crawl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, fqt }),
    });
    const json = await resp.json();
    if (!json.success) throw new Error(json.error);
    lastCrawlData = json.data || [];
    document.getElementById('crawlHint').textContent = '抓取完成';
    const fqtLabel = json.fqt === '1' ? '前复权' : json.fqt === '2' ? '后复权' : '不复权';
    document.getElementById('crawlResult').textContent = `保存：${json.file}，条数：${json.count}，${fqtLabel}`;
    document.getElementById('crawlUse').style.display = 'inline-block';
  } catch (e) {
    document.getElementById('crawlHint').textContent = `抓取失败：${e.message}`;
  } finally {
    showLoading(false);
  }
}

async function useCrawlData() {
  if (!lastCrawlData || lastCrawlData.length === 0) return;
  switchTab('data');
  lastLoadedData = lastCrawlData;
  setDateRangeDefaults(lastLoadedData);
  await applyDateRangeAndAnalyze();
}

function setDateRangeDefaults(data) {
  if (!data || data.length === 0) return;
  const maxDt = data[data.length - 1]?.dt;
  const maxDate = new Date(maxDt);
  if (Number.isNaN(maxDate.getTime())) return;
  const end = maxDate;
  const start = new Date(end);
  start.setMonth(start.getMonth() - 6);
  document.getElementById('rangeStart').value = toDateInputValue(start);
  document.getElementById('rangeEnd').value = toDateInputValue(end);
  document.getElementById('rangeHint').textContent = '默认最近6个月';
}

function toDateInputValue(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function filterByDate(data, start, end) {
  const s = new Date(start);
  const e = new Date(end);
  if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return data;
  return data.filter(r => {
    const d = new Date(r.dt);
    return d >= s && d <= e;
  });
}

async function applyDateRangeAndAnalyze() {
  if (!lastLoadedData || lastLoadedData.length === 0) {
    setStatus('error', '请先加载数据');
    return;
  }
  const start = document.getElementById('rangeStart').value;
  const end = document.getElementById('rangeEnd').value;
  const filtered = filterByDate(lastLoadedData, start, end);
  if (!filtered || filtered.length < 10) {
    setStatus('error', '选定时间范围内数据不足（至少10根K线）');
    return;
  }
  document.getElementById('rangeHint').textContent = `当前范围：${start} 至 ${end}，共 ${filtered.length} 根K线`;
  await runAnalysis(filtered);
}


// 点击空白关闭弹窗
document.addEventListener('click', (e) => {
  if (!document.getElementById('tooltipPanel').contains(e.target) && !e.target.closest('.signal-card')) {
    closeTooltip();
  }
});

initChart();
loadLocalFileList();
